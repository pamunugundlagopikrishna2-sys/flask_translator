<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Telugu Translator</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: Arial; background: #f0f4f8; display: flex; justify-content: center; padding: 40px 16px; min-height: 100vh; }
    .card { background: white; border-radius: 16px; padding: 32px; width: 100%; max-width: 700px; box-shadow: 0 4px 20px rgba(0,0,0,0.08); height: fit-content; }
    h1 { font-size: 24px; margin-bottom: 24px; color: #1a1a2e; }
    .lang-row { display: flex; gap: 12px; align-items: center; margin-bottom: 20px; }
    select { flex: 1; padding: 10px; border: 1px solid #ddd; border-radius: 8px; font-size: 15px; }
    .swap-btn { padding: 10px 16px; border: 1px solid #ddd; border-radius: 8px; cursor: pointer; font-size: 18px; background: #f8fafc; }
    .panels { display: grid; grid-template-columns: 1fr 1fr; gap: 16px; margin-bottom: 20px; }
    .panel { border: 1px solid #e2e8f0; border-radius: 10px; overflow: hidden; }
    .panel-title { background: #f8fafc; padding: 8px 14px; font-size: 13px; color: #64748b; border-bottom: 1px solid #e2e8f0; }
    textarea { width: 100%; height: 150px; border: none; padding: 14px; font-size: 15px; resize: none; outline: none; font-family: Arial; }
    #outputBox { min-height: 150px; padding: 14px; font-size: 15px; color: #334155; line-height: 1.7; word-break: break-word; }
    .placeholder { color: #94a3b8; font-style: italic; }
    .btn-row { display: flex; gap: 12px; }
    .translate-btn { flex: 1; padding: 13px; background: #4f46e5; color: white; border: none; border-radius: 10px; font-size: 16px; font-weight: 600; cursor: pointer; }
    .translate-btn:hover { background: #4338ca; }
    .translate-btn:disabled { background: #a5b4fc; cursor: not-allowed; }
    .copy-btn { padding: 13px 20px; background: #f1f5f9; border: 1px solid #e2e8f0; border-radius: 10px; font-size: 15px; cursor: pointer; }
    .copy-btn:disabled { opacity: 0.5; cursor: not-allowed; }
    #status { margin-top: 14px; font-size: 14px; text-align: center; min-height: 20px; }
    .ok  { color: #16a34a; }
    .err { color: #dc2626; }
  </style>
</head>
<body>
<div class="card">
  <h1>🌐 Language Translator</h1>

  <div class="lang-row">
    <select id="srcLang">
      {% for name, code in languages %}
        <option value="{{ code }}" {% if code == 'auto' %}selected{% endif %}>{{ name }}</option>
      {% endfor %}
    </select>
    <button class="swap-btn" onclick="swapLangs()">⇄</button>
    <select id="tgtLang">
      {% for name, code in languages %}
        {% if code != 'auto' %}
          <option value="{{ code }}" {% if code == 'te' %}selected{% endif %}>{{ name }}</option>
        {% endif %}
      {% endfor %}
    </select>
  </div>

  <div class="panels">
    <div class="panel">
      <div class="panel-title">Source Text</div>
      <textarea id="inputText" placeholder="Type here..."></textarea>
    </div>
    <div class="panel">
      <div class="panel-title">Translation</div>
      <div id="outputBox"><span class="placeholder">Translation appears here...</span></div>
    </div>
  </div>

  <div class="btn-row">
    <button class="translate-btn" id="transBtn" onclick="doTranslate()">Translate</button>
    <button class="copy-btn" id="copyBtn" onclick="copyText()" disabled>📋 Copy</button>
  </div>
  <div id="status"></div>
</div>

<script>
  let currentTranslation = "";

  function doTranslate() {
    const text = document.getElementById("inputText").value.trim();
    const src  = document.getElementById("srcLang").value;
    const tgt  = document.getElementById("tgtLang").value;
    const btn  = document.getElementById("transBtn");
    const out  = document.getElementById("outputBox");

    if (!text) {
      setStatus("Please enter some text first!", "err");
      return;
    }

    btn.disabled = true;
    btn.textContent = "Translating...";
    out.innerHTML = "<span class='placeholder'>Please wait...</span>";
    setStatus("", "");

    fetch("/translate", {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify({ text: text, src: src, tgt: tgt })
    })
    .then(function(res) { return res.json(); })
    .then(function(data) {
      if (data.translation) {
        currentTranslation = data.translation;
        out.textContent = data.translation;
        document.getElementById("copyBtn").disabled = false;
        setStatus("✅ Translation complete!", "ok");
      } else {
        out.innerHTML = "<span class='placeholder'>Translation failed</span>";
        setStatus("❌ " + (data.error || "Something went wrong"), "err");
      }
    })
    .catch(function(err) {
      out.innerHTML = "<span class='placeholder'>Error occurred</span>";
      setStatus("❌ Could not connect: " + err.message, "err");
    })
    .finally(function() {
      btn.disabled = false;
      btn.textContent = "Translate";
    });
  }

  function swapLangs() {
    var s = document.getElementById("srcLang");
    var t = document.getElementById("tgtLang");
    var tmp = s.value;
    s.value = t.value;
    t.value = tmp;
  }

  function copyText() {
    if (!currentTranslation) return;
    navigator.clipboard.writeText(currentTranslation).then(function() {
      setStatus("📋 Copied to clipboard!", "ok");
      setTimeout(function() { setStatus("", ""); }, 2000);
    });
  }

  function setStatus(msg, cls) {
    var el = document.getElementById("status");
    el.textContent = msg;
    el.className = cls;
  }
</script>
</body>
</html>
